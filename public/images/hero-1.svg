<svg viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0D47A1"/>
      <stop offset="45%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#64B5F6"/>
    </linearGradient>
    <linearGradient id="road1" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#37474F"/>
      <stop offset="100%" stop-color="#1A1A1A"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="900" fill="url(#sky1)"/>
  <!-- sun glow -->
  <circle cx="1250" cy="220" r="160" fill="#FFFFFF" opacity="0.18"/>
  <circle cx="1250" cy="220" r="90" fill="#FFF59D" opacity="0.35"/>
  <!-- distant hills -->
  <path d="M0 560 Q400 470 800 540 T1600 520 V900 H0 Z" fill="#1E6F3C" opacity="0.55"/>
  <path d="M0 620 Q500 560 1000 610 T1600 600 V900 H0 Z" fill="#1B5E20" opacity="0.8"/>
  <!-- road -->
  <path d="M0 900 L600 600 L1000 600 L1600 900 Z" fill="url(#road1)"/>
  <g stroke="#FFC107" stroke-width="10" stroke-dasharray="40 38">
    <line x1="800" y1="610" x2="800" y2="900"/>
  </g>
  <!-- covered van -->
  <g transform="translate(560,440)">
    <rect x="0" y="40" width="320" height="180" rx="10" fill="#F5F5F5"/>
    <rect x="0" y="40" width="320" height="180" rx="10" fill="none" stroke="#1565C0" stroke-width="4"/>
    <rect x="20" y="70" width="280" height="50" fill="#1E6F3C"/>
    <text x="160" y="180" font-family="Arial" font-weight="800" font-size="40" fill="#0D47A1" text-anchor="middle">ZSM</text>
    <!-- cab -->
    <path d="M320 90 L400 90 L450 150 L450 220 L320 220 Z" fill="#FFC107"/>
    <rect x="345" y="105" width="70" height="48" rx="4" fill="#0D47A1"/>
    <!-- wheels -->
    <circle cx="90" cy="230" r="38" fill="#0A0A0A"/><circle cx="90" cy="230" r="14" fill="#666"/>
    <circle cx="250" cy="230" r="38" fill="#0A0A0A"/><circle cx="250" cy="230" r="14" fill="#666"/>
    <circle cx="400" cy="230" r="38" fill="#0A0A0A"/><circle cx="400" cy="230" r="14" fill="#666"/>
  </g>
</svg>
