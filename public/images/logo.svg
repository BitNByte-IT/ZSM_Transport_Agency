<svg width="280" height="72" viewBox="0 0 280 72" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="zsmTruck" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E6F3C"/>
      <stop offset="55%" stop-color="#1565C0"/>
      <stop offset="100%" stop-color="#0D47A1"/>
    </linearGradient>
    <linearGradient id="zsmText" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0D47A1"/>
      <stop offset="100%" stop-color="#1E6F3C"/>
    </linearGradient>
  </defs>
  <!-- Truck icon -->
  <g>
    <!-- Cargo box -->
    <rect x="6" y="20" width="34" height="28" rx="3" fill="url(#zsmTruck)"/>
    <!-- ZSM monogram speed marks -->
    <path d="M13 27 L30 27 L13 41 L30 41" stroke="#FFC107" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Cab -->
    <path d="M40 28 L52 28 L60 38 L60 48 L40 48 Z" fill="#FFC107"/>
    <rect x="44" y="31" width="11" height="8" rx="1.5" fill="#0D47A1"/>
    <!-- Wheels -->
    <circle cx="19" cy="52" r="6" fill="#1A1A1A"/>
    <circle cx="19" cy="52" r="2.4" fill="#FFC107"/>
    <circle cx="50" cy="52" r="6" fill="#1A1A1A"/>
    <circle cx="50" cy="52" r="2.4" fill="#FFC107"/>
    <!-- Motion lines -->
    <path d="M2 26 H10" stroke="#1E6F3C" stroke-width="2" stroke-linecap="round"/>
    <path d="M0 33 H8" stroke="#1565C0" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Wordmark -->
  <text x="72" y="38" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="26" fill="url(#zsmText)" letter-spacing="1">ZSM</text>
  <text x="72" y="56" font-family="Arial, Helvetica, sans-serif" font-weight="600" font-size="12.5" fill="#5A6470" letter-spacing="2.4">TRANSPORT AGENCY</text>
</svg>
